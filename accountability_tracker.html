<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accountability Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #b8f763;
    --accent-dim: rgba(184,247,99,0.15);
    --text: #f0f0f0;
    --text-muted: #666;
    --text-mid: #999;
    --done-bg: rgba(184,247,99,0.2);
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  .header-left .month-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 6px;
  }

  .add-btn {
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    padding: 10px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }

  .add-btn:hover { opacity: 0.85; }
  .add-btn:active { transform: scale(0.97); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 1.5rem;
    align-items: start;
  }

  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-scroll {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
  }

  thead th {
    padding: 10px 6px;
    text-align: center;
    color: var(--text-muted);
    font-weight: 400;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: relative;
  }

  thead th.today-col {
    color: var(--accent);
  }

  thead th.task-header {
    text-align: left;
    padding: 10px 16px;
    min-width: 160px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 2;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td.task-name {
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 1;
    min-width: 160px;
    border-right: 1px solid var(--border);
  }

  tbody tr:hover td.task-name { background: #1a1a1a; }

  td.check-cell {
    text-align: center;
    padding: 6px 3px;
    cursor: pointer;
  }

  td.check-cell.today-col {
    background: rgba(184,247,99,0.04);
  }

  .check {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid var(--border-hover);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.12s;
    margin: auto;
  }

  .check:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .check.done {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check.done::after {
    content: '';
    display: block;
    width: 5px;
    height: 9px;
    border: 2px solid #0d0d0d;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  .weekend-col {
    opacity: 0.5;
  }

  .chart-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    position: sticky;
    top: 2rem;
  }

  .chart-panel h3 {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .stat-val {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .chart-wrap {
    position: relative;
    height: 220px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    margin-left: 6px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    vertical-align: middle;
    font-family: monospace;
    line-height: 1;
  }

  tbody tr:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #ff6b6b; }

  .empty-state {
    padding: 3rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    padding: 1.5rem;
    width: 320px;
  }

  .modal h2 {
    font-size: 1rem;
    margin-bottom: 1rem;
  }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.15s;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border-hover);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    cursor: pointer;
  }

  .btn-confirm {
    background: var(--accent);
    border: none;
    color: #0d0d0d;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    cursor: pointer;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .chart-panel { position: static; }
  }

  @media (max-width: 600px) {
    body { padding: 1rem; }
    .header-left h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Accountability Tracker</h1>
    <div class="month-label" id="monthLabel"></div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add task</button>
</header>

<div class="layout">
  <div class="table-panel">
    <div class="table-scroll">
      <table id="tracker">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="chart-panel">
    <h3>Monthly overview</h3>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-val" id="statToday">—</div>
        <div class="stat-label">Today %</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statAvg">—</div>
        <div class="stat-label">Month avg</div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="lineChart" role="img" aria-label="Line graph of daily task completion percentage across the month"></canvas>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>New task</h2>
    <input type="text" id="taskInput" placeholder="e.g. Morning workout" maxlength="50" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
const now = new Date();
const year = now.getFullYear();
const month = now.getMonth();
const todayDate = now.getDate();
const daysInMonth = new Date(year, month + 1, 0).getDate();

document.getElementById('monthLabel').textContent =
  now.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_SHORT = now.toLocaleDateString('en-GB', { month: 'short' });

let tasks = ['Morning workout', 'Read 20 mins', 'Drink 2L water'];
let checks = {};

function storageKey(task, day) { return task + '||' + year + '-' + month + '-' + day; }

function getCompletionPct(dayNum) {
  if (!tasks.length) return 0;
  const done = tasks.filter(t => checks[storageKey(t, dayNum)]).length;
  return Math.round((done / tasks.length) * 100);
}

function isWeekend(dayNum) {
  const d = new Date(year, month, dayNum).getDay();
  return d === 0 || d === 6;
}

function renderTable() {
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  thead.innerHTML = '';
  tbody.innerHTML = '';

  const hr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.className = 'task-header';
  th0.textContent = 'Tasks';
  hr.appendChild(th0);

  for (let d = 1; d <= daysInMonth; d++) {
    const th = document.createElement('th');
    const dayOfWeek = new Date(year, month, d).getDay();
    const isWknd = dayOfWeek === 0 || dayOfWeek === 6;
    th.innerHTML = `<div>${DAY_NAMES[dayOfWeek]}</div><div style="font-size:0.8em;color:var(--text);margin-top:2px">${d}</div>`;
    if (d === todayDate) th.className = 'today-col';
    else if (isWknd) th.className = 'weekend-col';
    hr.appendChild(th);
  }
  thead.appendChild(hr);

  if (!tasks.length) {
    const emptyRow = document.createElement('tr');
    const emptyTd = document.createElement('td');
    emptyTd.colSpan = daysInMonth + 1;
    emptyTd.className = 'empty-state';
    emptyTd.textContent = 'No tasks yet — add one above';
    emptyRow.appendChild(emptyTd);
    tbody.appendChild(emptyRow);
    return;
  }

  tasks.forEach(task => {
    const tr = document.createElement('tr');
    const tdName = document.createElement('td');
    tdName.className = 'task-name';
    tdName.innerHTML = task +
      `<button class="delete-btn" title="Remove task" onclick="removeTask('${task.replace(/'/g,"\\'")}')">✕</button>`;
    tr.appendChild(tdName);

    for (let d = 1; d <= daysInMonth; d++) {
      const td = document.createElement('td');
      const isWknd = isWeekend(d);
      td.className = 'check-cell' + (d === todayDate ? ' today-col' : '') + (isWknd ? ' weekend-col' : '');
      const box = document.createElement('div');
      box.className = 'check' + (checks[storageKey(task, d)] ? ' done' : '');
      const capturedTask = task;
      const capturedDay = d;
      box.onclick = () => {
        checks[storageKey(capturedTask, capturedDay)] = !checks[storageKey(capturedTask, capturedDay)];
        box.className = 'check' + (checks[storageKey(capturedTask, capturedDay)] ? ' done' : '');
        updateChart();
        updateStats();
      };
      td.appendChild(box);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

let chart;

function buildChart() {
  const labels = [];
  const data = [];
  for (let d = 1; d <= daysInMonth; d++) {
    labels.push(d);
    data.push(getCompletionPct(d));
  }

  chart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#b8f763',
        backgroundColor: 'rgba(184,247,99,0.08)',
        fill: true,
        tension: 0.35,
        pointBackgroundColor: labels.map((_, i) => (i + 1 === todayDate ? '#b8f763' : 'transparent')),
        pointBorderColor: labels.map((_, i) => (i + 1 === todayDate ? '#b8f763' : 'rgba(184,247,99,0.4)')),
        pointRadius: labels.map((_, i) => (i + 1 === todayDate ? 5 : 3)),
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 0, max: 100,
          ticks: {
            callback: v => v + '%',
            color: '#555',
            font: { size: 10, family: 'DM Mono' },
            stepSize: 25
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.05)' }
        },
        x: {
          ticks: {
            color: '#555',
            font: { size: 10, family: 'DM Mono' },
            autoSkip: true,
            maxTicksLimit: 10
          },
          grid: { display: false },
          border: { color: 'rgba(255,255,255,0.05)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e1e1e',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#b8f763',
          bodyColor: '#999',
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont: { family: 'DM Mono', size: 11 },
          callbacks: {
            title: ctx => MONTH_SHORT + ' ' + ctx[0].label,
            label: ctx => ctx.parsed.y + '% complete'
          }
        }
      }
    }
  });
}

function updateChart() {
  if (!chart) return;
  chart.data.datasets[0].data = Array.from({ length: daysInMonth }, (_, i) => getCompletionPct(i + 1));
  chart.update();
}

function updateStats() {
  const todayPct = getCompletionPct(todayDate);
  document.getElementById('statToday').textContent = todayPct + '%';

  const filled = [];
  for (let d = 1; d <= todayDate; d++) {
    filled.push(getCompletionPct(d));
  }
  const avg = filled.length ? Math.round(filled.reduce((a, b) => a + b, 0) / filled.length) : 0;
  document.getElementById('statAvg').textContent = avg + '%';
}

function removeTask(task) {
  tasks = tasks.filter(t => t !== task);
  renderTable();
  updateChart();
  updateStats();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('taskInput').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('taskInput').value = '';
}

function confirmAdd() {
  const val = document.getElementById('taskInput').value.trim();
  if (val) {
    tasks.push(val);
    renderTable();
    updateChart();
    updateStats();
    closeModal();
  }
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAdd();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

renderTable();
buildChart();
updateStats();
</script>
</body>
</html>
